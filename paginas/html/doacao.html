<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doações</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/doacao.css">
</head>

<body>

<div class="conteudo">

  <h2>📦 Cadastro de Doações</h2>
  <p class="subtitulo">Cadastre itens que você deseja doar 💙</p>

  <form id="formProduto">
    <label>📝 Título do item</label>
    <input type="text" id="titulo" required>

    <label>📄 Descrição</label>
    <textarea id="descricao" required></textarea>

    <label>🏷️ Categoria</label>
    <select id="categoria">
      <option value="roupa">👕 Roupa</option>
      <option value="casa">🏠 Casa</option>
      <option value="comida">🍞 Comida</option>
      <option value="dinheiro">💰 Dinheiro</option>
    </select>

    <label>🖼️ URL da imagem</label>
    <input type="text" id="imagem" required>

    <button type="submit">➕ Cadastrar Doação</button>
  </form>

  <p id="status"></p>

  <div class="titulo-secao">🎁 Doações Disponíveis</div>

  <div id="produtos" class="cards-container"></div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBerrzBXG7xEPY-zokNSzxsOLcCXHvSKyA",
    authDomain: "caridade-6464e.firebaseapp.com",
    projectId: "caridade-6464e",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<script>
  function carregarProdutos() {
    const container = document.getElementById("produtos");
    container.innerHTML = "<p>Carregando...</p>";

    db.collection("produtos").get().then((querySnapshot) => {
      container.innerHTML = "";

      querySnapshot.forEach((doc) => {
        const item = doc.data();

        const div = document.createElement("div");
        div.className = "card-item";

        div.innerHTML = `
          <img src="${item.imagem}">
          <h3>🎁 ${item.titulo}</h3>
          <p>${item.descricao}</p>
          <div class="categoria">📌 ${item.categoria}</div>
        `;

        container.appendChild(div);
      });
    });
  }

  window.addEventListener("load", carregarProdutos);
</script>

<script>
  const form = document.getElementById("formProduto");
  const status = document.getElementById("status");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const titulo = document.getElementById("titulo").value;
    const descricao = document.getElementById("descricao").value;
    const categoria = document.getElementById("categoria").value;
    const imagem = document.getElementById("imagem").value;

    db.collection("produtos").add({
      titulo,
      descricao,
      categoria,
      imagem,
      criadoEm: new Date()
    })
    .then(() => {
      status.innerText = "✅ Doação cadastrada com sucesso!";
      status.style.color = "green";
      form.reset();
      carregarProdutos();
    })
    .catch((error) => {
      status.innerText = "❌ Erro: " + error;
      status.style.color = "red";
    });
  });
</script>

</body>
</html>
