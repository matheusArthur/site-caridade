<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doações</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/menu.css">
  <link rel="stylesheet" href="../css/doacao.css">
</head>

<body>

<!-- MENU -->
<header>
  <nav>
    <a class="logo" href="../html/home.html">Caridade</a>

    <div class="mobile-menu">
      <div class="line1"></div>
      <div class="line2"></div>
      <div class="line3"></div>
    </div>

    <ul class="nav-list">
      <li><a href="../html/home.html">Home</a></li>
      <li><a href="eventos.html">Eventos</a></li>
      <li><a href="sobre.html">Sobre</a></li>
      <li><a href="doacao.html" class="active">Doações</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>
</header>

<!-- CONTEÚDO -->
<div class="conteudo">

  <h2>Cadastrar Produto</h2>

  <form id="formProduto">
    <label>Título:</label>
    <input type="text" id="titulo" required>

    <label>Descrição:</label>
    <textarea id="descricao" required></textarea>

    <label>Categoria:</label>
    <select id="categoria">
      <option value="roupa">Roupa</option>
      <option value="casa">Casa</option>
      <option value="comida">Comida</option>
      <option value="dinheiro">Dinheiro</option>
    </select>

    <label>URL da Imagem:</label>
    <input type="text" id="imagem" required>

    <button type="submit">Cadastrar</button>
  </form>

  <p id="status"></p>

  <hr style="margin: 40px 0;">

  <div class="titulo-secao">Itens Disponíveis</div>

  <div id="produtos" class="cards-container"></div>
</div>

<!-- MENU MOBILE -->
<script src="../js/mobile-navbar.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "caridade-6464e.firebaseapp.com",
    projectId: "caridade-6464e",
    storageBucket: "caridade-6464e.firebasestorage.app",
    messagingSenderId: "916897058334",
    appId: "1:916897058334:web:906d1343b3523b3a9ca80f"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<script>
  function carregarProdutos() {
    const container = document.getElementById("produtos");
    container.innerHTML = "<p>Carregando...</p>";

    db.collection("produtos").get().then((querySnapshot) => {
      container.innerHTML = "";

      querySnapshot.forEach((doc) => {
        const item = doc.data();

        const card = `
          <div class="card-item">
            <img src="${item.imagem}" alt="${item.titulo}">
            <h3>${item.titulo}</h3>
            <p>${item.descricao}</p>
          </div>
        `;

        container.innerHTML += card;
      });
    });
  }

  window.onload = carregarProdutos;
</script>

<script>
  const form = document.getElementById("formProduto");
  const status = document.getElementById("status");

  form.addEventListener("submit", function(e) {
    e.preventDefault();

    const titulo = document.getElementById("titulo").value;
    const descricao = document.getElementById("descricao").value;
    const categoria = document.getElementById("categoria").value;
    const imagem = document.getElementById("imagem").value;

    db.collection("produtos").add({
      titulo,
      descricao,
      categoria,
      imagem,
      criadoEm: new Date()
    })
    .then(() => {
      status.innerText = "Produto cadastrado com sucesso!";
      form.reset();
      carregarProdutos();
    })
    .catch((error) => {
      status.innerText = "Erro ao cadastrar: " + error;
    });
  });
</script>

</body>
</html>
