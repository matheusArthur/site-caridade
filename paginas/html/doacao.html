<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doações</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../css/menu.css">
  <link rel="stylesheet" href="../css/doacao.css">
</head>

<body>

<!-- MENU -->
<div id="menu"></div>

<div class="conteudo">

  <h2>📦 Cadastro de Doações</h2>
  <p class="subtitulo">Cadastre itens que você deseja doar 💙</p>

  <form id="formProduto">

    <label>📝 Título do item</label>
    <input type="text" id="titulo" required>

    <label>📄 Descrição</label>
    <textarea id="descricao" required></textarea>

    <label>🏷️ Categoria</label>
    <select id="categoria">
      <option value="roupa">👕 Roupa</option>
      <option value="casa">🏠 Casa</option>
      <option value="comida">🍞 Comida</option>
      <option value="dinheiro">💰 Dinheiro</option>
    </select>

    <label>📍 Região</label>
    <input type="text" id="regiao" required>

    <label>💰 Valor (opcional)</label>
    <input type="number" id="valor">

    <label>🖼️ URL da imagem</label>
    <input type="text" id="imagem" required>

    <button type="submit">➕ Cadastrar Doação</button>

  </form>

  <p id="status"></p>

  <!-- 🔥 FILTROS -->
  <div class="filtros">
    <button onclick="filtrar('todos', this)" class="active">Todos</button>
    <button onclick="filtrar('roupa', this)">👕</button>
    <button onclick="filtrar('casa', this)">🏠</button>
    <button onclick="filtrar('comida', this)">🍞</button>
    <button onclick="filtrar('dinheiro', this)">💰</button>
  </div>

  <div class="titulo-secao">🎁 Doações Disponíveis</div>

  <div id="produtos" class="cards-container"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-firestore-compat.js"></script>

<script src="../js/firebase-init.js"></script>
<script src="../js/auth.js"></script>

<script src="../js/menu.js"></script>
<script src="../js/mobile-navbar.js"></script>

<script>
const db = firebase.firestore();

let categoriaAtual = "todos";

/* 🔥 abrir produto */
function abrirProduto(id) {
  window.location.href = `produtosDetalhe.html?id=${id}`;
}

/* 🔥 carregar produtos */
function carregarProdutos() {
  const container = document.getElementById("produtos");
  container.innerHTML = "<p>Carregando...</p>";

  db.collection("produtos")
    .get()
    .then(snapshot => {

      container.innerHTML = "";

      snapshot.forEach(doc => {
        const item = doc.data();

        // 🔥 normalização (evita erro de maiúscula/minúscula)
        const categoriaItem = (item.categoria || "").toLowerCase().trim();

        if (categoriaAtual !== "todos" && categoriaItem !== categoriaAtual) return;

        const card = document.createElement("div");
        card.className = "card-item";

        card.innerHTML = `
          <img src="${item.imagem}" onerror="this.src='https://via.placeholder.com/300'">

          <h3>${item.titulo}</h3>
          <p>${item.descricao}</p>

          <div>🏷️ ${item.categoria}</div>
          <div>📍 ${item.regiao}</div>
          <div>💰 R$ ${item.valor || "0,00"}</div>

          <button onclick="abrirProduto('${doc.id}')">
            Tenho interesse
          </button>
        `;

        container.appendChild(card);
      });

    });
}

/* 🔥 filtro corrigido */
function filtrar(cat, btn) {
  categoriaAtual = cat.toLowerCase();

  document.querySelectorAll('.filtros button')
    .forEach(b => b.classList.remove('active'));

  btn.classList.add('active');

  carregarProdutos();
}

/* 🔥 salvar doação */
document.getElementById("formProduto").addEventListener("submit", e => {
  e.preventDefault();

  db.collection("produtos").add({
    titulo: titulo.value,
    descricao: descricao.value,
    categoria: categoria.value.toLowerCase(), // 🔥 importante
    imagem: imagem.value,
    regiao: regiao.value,
    valor: valor.value || "0,00",
    criadoEm: new Date()
  }).then(() => {
    status.innerText = "✅ Cadastrado com sucesso!";
    document.getElementById("formProduto").reset();
    carregarProdutos();
  });
});

/* 🔥 inicial */
window.onload = carregarProdutos;
</script>

</body>
</html>
