<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doações</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/menu.css">
  <link rel="stylesheet" href="../css/doacao.css">
</head>

<body>

<!-- MENU -->
<div id="menu"></div>

<div class="conteudo">

  <h2>📦 Cadastro de Doações</h2>
  <p class="subtitulo">Cadastre itens que você deseja doar 💙</p>

  <form id="formProduto">

    <label>📝 Título do item</label>
    <input type="text" id="titulo" required>

    <label>📄 Descrição</label>
    <textarea id="descricao" required></textarea>

    <label>🏷️ Categoria</label>
    <select id="categoria">
      <option value="roupa">👕 Roupa</option>
      <option value="casa">🏠 Casa</option>
      <option value="comida">🍞 Comida</option>
      <option value="dinheiro">💰 Dinheiro</option>
    </select>

    <label>🖼️ URL da imagem</label>
    <input type="text" id="imagem" required>

    <button type="submit">➕ Cadastrar Doação</button>

  </form>

  <p id="status"></p>

  <!-- FILTROS -->
  <div class="filtros">
    <button onclick="filtrar('todos')" class="active">Todos</button>
    <button onclick="filtrar('roupa')">👕</button>
    <button onclick="filtrar('casa')">🏠</button>
    <button onclick="filtrar('comida')">🍞</button>
    <button onclick="filtrar('dinheiro')">💰</button>
  </div>

  <div class="titulo-secao">🎁 Doações Disponíveis</div>

  <div id="produtos" class="cards-container"></div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "SUA_API_AQUI",
    authDomain: "caridade-6464e.firebaseapp.com",
    projectId: "caridade-6464e",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  let categoriaAtual = "todos";

  function carregarProdutos() {
    const container = document.getElementById("produtos");
    container.innerHTML = "<p class='loading'>Carregando...</p>";

    db.collection("produtos").orderBy("criadoEm","desc").get()
    .then(snapshot => {
      container.innerHTML = "";

      snapshot.forEach(doc => {
        const item = doc.data();

        if(categoriaAtual !== "todos" && item.categoria !== categoriaAtual){
          return;
        }

        const card = document.createElement("div");
        card.className = "card-item";

        card.innerHTML = `
          <img src="${item.imagem}" onerror="this.src='https://via.placeholder.com/300'">
          <h3>${item.titulo}</h3>
          <p>${item.descricao}</p>
          <div class="categoria">${item.categoria}</div>
          <button class="btn-interesse">Tenho interesse</button>
        `;

        container.appendChild(card);
      });
    });
  }

  function filtrar(cat) {
    categoriaAtual = cat;

    document.querySelectorAll('.filtros button')
      .forEach(btn => btn.classList.remove('active'));

    event.target.classList.add('active');

    carregarProdutos();
  }

  document.getElementById("formProduto")
  .addEventListener("submit", e => {
    e.preventDefault();

    const titulo = document.getElementById("titulo").value;
    const descricao = document.getElementById("descricao").value;
    const categoria = document.getElementById("categoria").value;
    const imagem = document.getElementById("imagem").value;

    db.collection("produtos").add({
      titulo,
      descricao,
      categoria,
      imagem,
      criadoEm: new Date()
    })
    .then(()=>{
      document.getElementById("status").innerText="✅ Cadastrado!";
      formProduto.reset();
      carregarProdutos();
    })
    .catch(()=>{
      document.getElementById("status").innerText="❌ Erro!";
    });
  });

  window.onload = carregarProdutos;
</script>

<!-- MENU JS -->
<script src="../js/menu.js"></script>
<script src="../js/mobile-navbar.js"></script>

</body>
</html>
