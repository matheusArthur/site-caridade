<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/menu.css">
  <link rel="stylesheet" href="../css/produtos.css">
</head>

<body>

<!-- MENU -->
<header>
  <nav>
    <a class="logo" href="../html/home.html">Caridade</a>

    <div class="mobile-menu">
      <div class="line1"></div>
      <div class="line2"></div>
      <div class="line3"></div>
    </div>

    <ul class="nav-list">
      <li><a href="../html/home.html">Home</a></li>
      <li><a href="eventos.html">Eventos</a></li>
      <li><a href="sobre.html">Sobre</a></li>
      <li><a href="doacao.html">Doações</a></li>
      <li><a href="produtos.html" class="active">Produtos</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>Faça uma boa doação</h1>
    <button>Saber +</button>
  </div>
</section>

<!-- CATEGORIAS -->
<section class="categorias">
  <h2>O que você procura?</h2>

  <div class="categorias-grid">
    <div class="categoria" data-categoria="roupa">ROUPA</div>
    <div class="categoria" data-categoria="casa">CASA</div>
    <div class="categoria" data-categoria="comida">COMIDA</div>
    <div class="categoria" data-categoria="dinheiro">DINHEIRO</div>
  </div>
</section>

<!-- PRODUTOS -->
<section class="produtos">
  <h2>Últimos adicionados</h2>

  <div id="lista-produtos" class="produtos-grid"></div>
</section>

<!-- JS MENU -->
<script src="../js/mobile-navbar.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "SUA_API_KEY",
    authDomain: "caridade-6464e.firebaseapp.com",
    projectId: "caridade-6464e"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
</script>

<!-- SCRIPT PRODUTOS -->
<script>
  const container = document.getElementById("lista-produtos");

  function carregarProdutos(categoria = null) {
    container.innerHTML = "Carregando...";

    let ref = db.collection("produtos");

    if (categoria) {
      ref = ref.where("categoria", "==", categoria);
    }

    ref.get().then(snapshot => {
      container.innerHTML = "";

      snapshot.forEach(doc => {
        const item = doc.data();

        const card = `
          <div class="card">
            <img src="${item.imagem}">
            <div class="card-info">
              <h3>${item.titulo}</h3>
              <p>${item.descricao}</p>
              <span>${item.categoria}</span>
            </div>
          </div>
        `;

        container.innerHTML += card;
      });
    });
  }

  // FILTRO POR CATEGORIA
  document.querySelectorAll(".categoria").forEach(btn => {
    btn.addEventListener("click", () => {
      const cat = btn.getAttribute("data-categoria");
      carregarProdutos(cat);
    });
  });

  // CARREGAR TODOS
  carregarProdutos();
</script>

</body>
</html>
