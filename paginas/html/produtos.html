<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produtos</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/menu.css">
<link rel="stylesheet" href="../css/produtos.css">
</head>

<body>

<!-- MENU -->
<div id="menu"></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>Produtos para Doação</h1>
    <button>Explorar</button>
  </div>
</section>

<!-- CATEGORIAS -->
<section class="categorias">
  <h2>Categorias</h2>

  <div class="categorias-grid">
    <div class="categoria">👕 Roupas</div>
    <div class="categoria">🏠 Casa</div>
    <div class="categoria">🍞 Alimentos</div>
    <div class="categoria">💰 Financeiro</div>
  </div>
</section>

<!-- PRODUTOS DINÂMICOS -->
<section class="produtos">
  <h2>Doações Disponíveis</h2>

  <div id="produtos" class="produtos-grid"></div>
</section>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBerrzBXG7xEPY-zokNSzxsOLcCXHvSKyA",
  authDomain: "caridade-6464e.firebaseapp.com",
  projectId: "caridade-6464e",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* CARREGAR PRODUTOS */
function carregarProdutos() {
  const container = document.getElementById("produtos");
  container.innerHTML = "<p>Carregando...</p>";

  db.collection("produtos")
    .orderBy("criadoEm", "desc")
    .get()
    .then(snapshot => {

      container.innerHTML = "";

      snapshot.forEach(doc => {
        const item = doc.data();

        const card = document.createElement("div");
        card.className = "card-item";

        card.innerHTML = `
          <img src="${item.imagem}" onerror="this.src='https://via.placeholder.com/300'">
          <h3>${item.titulo}</h3>
          <p>${item.descricao}</p>
          <div class="categoria">${item.categoria}</div>
          <div class="btn-interesse">Tenho interesse</div>
        `;

        container.appendChild(card);
      });

    })
    .catch(() => {
      container.innerHTML = "<p>Erro ao carregar dados</p>";
    });
}

/* INICIAL */
window.onload = carregarProdutos;
</script>

<!-- MENU JS -->
<script src="../js/menu.js"></script>
<script src="../js/mobile-navbar.js"></script>

</body>
</html>
