<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobre Nós</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/sobre.css">
    <link rel="stylesheet" href="../css/eventos.css">
</head>

<body>

<!-- MENU DINÂMICO -->
<div id="menu"></div>

<!-- TOPO -->
<section class="sobre-topo">
    <div class="container">
        <h1>Transforme vidas com sua doação</h1>
        <p>
            Sua contribuição ajuda a levar esperança para quem mais precisa.
        </p>
    </div>
</section>

<!-- IMAGEM COM TEXTO DINÂMICO -->
<section class="sobre-imagem">
    <img src="../img/i1.jpg" class="sobre-img">

    <div class="overlay"></div>

    <div class="sobre-texto" id="texto-dinamico">
        Doe esperança e transforme vidas.
    </div>
</section>

<!-- VÍDEOS -->
<section class="cidade">
    <h2>A importância de doar</h2>

    <div class="event-grid">

        <div class="event-card">
            <div class="event-info">
                <h3>Por que doar?</h3>
                <span>Assistir</span>
            </div>
        </div>

        <div class="event-card">
            <div class="event-info">
                <h3>Impacto das doações</h3>
                <span>Assistir</span>
            </div>
        </div>

        <div class="event-card">
            <div class="event-info">
                <h3>Solidariedade</h3>
                <span>Assistir</span>
            </div>
        </div>

        <div class="event-card">
            <div class="event-info">
                <h3>Ajude mais pessoas</h3>
                <span>Assistir</span>
            </div>
        </div>

    </div>
</section>

<!-- MENU (IMPORTANTE) -->
<script src="../js/menu.js"></script>

<!-- MENU MOBILE -->
<script src="../js/mobile-navbar.js"></script>

<!-- TEXTO DINÂMICO -->
<script>
const textos = [
  "Doe esperança e transforme vidas.",
  "Cada gesto pode mudar um destino.",
  "Ajude hoje, transforme o amanhã.",
  "Solidariedade que gera impacto real."
];

let i = 0;

setInterval(() => {
  const texto = document.getElementById("texto-dinamico");

  texto.classList.add("fade");

  setTimeout(() => {
    i = (i + 1) % textos.length;
    texto.innerText = textos[i];
    texto.classList.remove("fade");
  }, 500);

}, 10000);
</script>

</body>
</html>
