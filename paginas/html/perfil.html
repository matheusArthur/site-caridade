<script>
const firebaseConfig = {
  apiKey: "AIzaSyBerrzBXG7xEPY-zokNSzxsOLcCXHvSKyA",
  authDomain: "caridade-6464e.firebaseapp.com",
  projectId: "caridade-6464e"

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

<!-- MENU JS -->
<script src="../js/menu.js"></script>
<script src="../js/mobile-navbar.js"></script>

<!-- FOTO PERFIL SCRIPT -->
<script>
const inputFoto = document.getElementById("inputFoto");
const fotoPerfil = document.getElementById("fotoPerfil");

/* carregar foto salva */
window.onload = function () {
  const fotoSalva = localStorage.getItem("fotoPerfil");
  if (fotoSalva) {
    fotoPerfil.src = fotoSalva;
  }

  carregarProdutosRequisitados();
};

/* trocar foto */
inputFoto.addEventListener("change", function () {
  const file = this.files[0];

  if (file) {
    const reader = new FileReader();

    reader.onload = function (e) {
      fotoPerfil.src = e.target.result;
      localStorage.setItem("fotoPerfil", e.target.result);
    };

    reader.readAsDataURL(file);
  }
});

/* 🔥 CARREGAR PRODUTOS REQUISITADOS */
function carregarProdutosRequisitados() {
  const container = document.getElementById("produtosAdquiridos");

  db.collection("produtos")
    .where("requisitado", "==", true)
    .get()
    .then(snapshot => {

      container.innerHTML = "";

      if (snapshot.empty) {
        container.innerHTML = "<p>Nenhum produto adquirido ainda.</p>";
        return;
      }

      snapshot.forEach(doc => {
        const item = doc.data();

        const div = document.createElement("div");
        div.className = "produto";

        div.innerHTML = `
          <img src="${item.imagem || 'https://via.placeholder.com/300'}">
          <h3>${item.titulo || ''}</h3>
          <p>${item.descricao || ''}</p>
          <span>R$ ${item.valor || '0,00'}</span>
        `;

        container.appendChild(div);
      });

    })
    .catch(error => {
      console.error("Erro ao carregar produtos:", error);
    });
}
</script>

</body>
