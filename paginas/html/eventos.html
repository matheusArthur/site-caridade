<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/eventos.css">
</head>

<body>

<!-- MENU -->
<div id="menu"></div>

<!-- HERO -->
<header class="hero">
    <div class="hero-overlay">
        <h1>Eventos Solidários</h1>
        <p id="frase">A solidariedade transforma vidas</p>
    </div>
</header>

<!-- BUSCA -->
<section class="search-section">
    <h2>Descubra eventos e ações solidárias</h2>
    <input type="text" id="busca" placeholder="Buscar por cidade, tema ou causa...">
</section>

<!-- VIDEOS -->
<section class="videos-section">
    <div id="event-grid" class="event-grid"></div>
</section>

<!-- FRASE INSPIRAÇÃO -->
<section class="inspiration">
    <h2>🌍 Faça parte da mudança</h2>
    <p>
        Eventos de solidariedade não são apenas encontros — são oportunidades de transformar vidas.
        Cada gesto importa. Cada ação gera impacto.
    </p>
</section>

<script src="../js/menu.js"></script>
<script src="../js/mobile-navbar.js"></script>

<script>
const API_KEY = "AIzaSyBerrzBXG7xEPY-zokNSzxsOLcCXHvSKyA";

const container = document.getElementById("event-grid");
const inputBusca = document.getElementById("busca");

// FRASES DINÂMICAS
const frases = [
    "A solidariedade transforma vidas.",
    "Doe hoje, mude o amanhã.",
    "Pequenas ações geram grandes mudanças.",
    "Seu gesto pode salvar alguém."
];

let i = 0;
setInterval(() => {
    i = (i + 1) % frases.length;
    document.getElementById("frase").innerText = frases[i];
}, 8000);


// CARREGAR VIDEOS
async function carregarVideos(termo = "doação solidariedade Brasil") {

    container.innerHTML = "Carregando...";

    try {
        const res = await fetch(
            `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(termo)}&type=video&maxResults=10&order=date&regionCode=BR&key=${API_KEY}`
        );

        const data = await res.json();

        container.innerHTML = "";

        data.items.forEach(video => {

            const videoId = video.id.videoId;
            const titulo = video.snippet.title;
            const thumb = video.snippet.thumbnails.high.url;

            const card = `
                <div class="event-card" onclick="abrirVideo('${videoId}')">
                    <img src="${thumb}" alt="">
                    
                    <div class="event-info">
                        <h3>${titulo}</h3>
                        <span>Assistir</span>
                    </div>
                </div>
            `;

            container.innerHTML += card;
        });

    } catch (erro) {
        container.innerHTML = "Erro ao carregar vídeos.";
    }
}

// ABRIR VIDEO
function abrirVideo(id) {
    window.open(`https://www.youtube.com/watch?v=${id}`, "_blank");
}

// BUSCA
inputBusca.addEventListener("keyup", (e) => {
    const termo = e.target.value;

    if (termo.length > 2) {
        carregarVideos(termo);
    }
});

// INICIAL
carregarVideos();
</script>

</body>
</html>
