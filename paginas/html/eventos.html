<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Eventos</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/eventos.css">
</head>

<body>

<!-- ===== MENU DINÂMICO ===== -->
<div id="menu"></div>

<!-- ===== HERO ===== -->
<header class="hero">
    <img src="../img/i1.jpg" class="hero-img">
    <div class="hero-content">
        <h1>Eventos</h1>
        <p>Acompanhe os principais eventos solidários.</p>
    </div>
</header>

<!-- ===== CIDADE ===== -->
<section class="cidade">
    <h2>Londrina</h2>

    <div class="event-grid">

        <div class="event-card" data-youtube="https://www.youtube.com/watch?v=dQw4w9WgXcQ">
            <div class="event-info">
                <h3>Coleta de lixo equipada</h3>
                <span>26/08</span>
            </div>
        </div>

        <div class="event-card" data-youtube="https://youtu.be/aqz-KE-bpKQ">
            <div class="event-info">
                <h3>Ação ambiental</h3>
                <span>26/08</span>
            </div>
        </div>

        <div class="event-card" data-youtube="https://youtu.be/aqz-KE-bpKQ">
            <div class="event-info">
                <h3>Doação de alimentos</h3>
                <span>26/08</span>
            </div>
        </div>

        <div class="event-card" data-youtube="https://youtu.be/aqz-KE-bpKQ">
            <div class="event-info">
                <h3>Campanha solidária</h3>
                <span>26/08</span>
            </div>
        </div>

    </div>
</section>

<!-- ===== SCRIPT MENU ===== -->
<script src="../js/menu.js"></script>

<!-- ===== MENU MOBILE ===== -->
<script src="../js/mobile-navbar.js"></script>

<!-- ===== EVENTOS JS ===== -->
<script>
document.querySelectorAll(".event-card").forEach(card => {
    card.addEventListener("click", () => {
        const link = card.getAttribute("data-youtube");
        if (link) {
            window.open(link, "_blank");
        }
    });
});
</script>

<!-- ===== FIREBASE ===== -->
<script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>
<script src="../js/firebase-init.js"></script>
<script src="../js/auth-guard.js"></script>

</body>
</html>
