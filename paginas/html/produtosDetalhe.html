<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes do Produto</title>

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/menu.css">
  <link rel="stylesheet" href="../css/produtosDetalhe.css">
</head>

<body>

<!-- MENU -->
<header>
  <nav>
    <a class="logo" href="../html/home.html">Caridade</a>

    <div class="mobile-menu">
      <div class="line1"></div>
      <div class="line2"></div>
      <div class="line3"></div>
    </div>

    <ul class="nav-list">
      <li><a href="../html/home.html">Home</a></li>
      <li><a href="eventos.html">Eventos</a></li>
      <li><a href="sobre.html">Sobre</a></li>
      <li><a href="doacao.html">Doações</a></li>
      <li><a href="produtos.html">Produtos</a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </ul>
  </nav>
</header>

<!-- PRODUTO PRINCIPAL -->
<section class="produto-detalhe">

  <div class="produto-img">
    <img id="imgProduto">
  </div>

  <div class="produto-info">
    <h1 id="titulo"></h1>
    <p id="descricao"></p>

    <div class="categoria">
      Categoria: <span id="categoria"></span>
    </div>

    <button class="btn-doar">Quero esse item</button>
  </div>

</section>

<!-- PRODUTOS RELACIONADOS -->
<section class="relacionados">
  <h2>Itens da mesma categoria</h2>
  <div id="relacionados" class="produtos-grid"></div>
</section>

<!-- MENU MOBILE -->
<script src="../js/mobile-navbar.js"></script>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "caridade-6464e.firebaseapp.com",
  projectId: "caridade-6464e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<!-- SCRIPT PRINCIPAL -->
<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let categoriaAtual = "";

// 🔹 CARREGAR PRODUTO PRINCIPAL
db.collection("produtos").doc(id).get().then(doc => {
  const item = doc.data();

  document.getElementById("imgProduto").src = item.imagem;
  document.getElementById("titulo").innerText = item.titulo;
  document.getElementById("descricao").innerText = item.descricao;
  document.getElementById("categoria").innerText = item.categoria;

  categoriaAtual = item.categoria;

  carregarRelacionados();
});

// 🔹 CARREGAR PRODUTOS DA MESMA CATEGORIA
function carregarRelacionados() {
  const container = document.getElementById("relacionados");

  db.collection("produtos")
    .where("categoria", "==", categoriaAtual)
    .get()
    .then(snapshot => {

      container.innerHTML = "";

      snapshot.forEach(doc => {
        // NÃO mostrar o mesmo produto
        if (doc.id === id) return;

        const item = doc.data();

        const card = `
          <div class="card" onclick="abrirProduto('${doc.id}')">
            <img src="${item.imagem}">
            <div class="card-info">
              <h3>${item.titulo}</h3>
              <p>${item.descricao.substring(0, 50)}...</p>
            </div>
          </div>
        `;

        container.innerHTML += card;
      });
    });
}

// 🔹 ABRIR OUTRO PRODUTO
function abrirProduto(id) {
  window.location.href = `produtosDetalhe.html?id=${id}`;
}
</script>

</body>
</html>
