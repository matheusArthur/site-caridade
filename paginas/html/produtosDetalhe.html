<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes do Produto</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/menu.css">
  <link rel="stylesheet" href="../css/produtosDetalhe.css">
</head>

<body>

  <!-- MENU -->
  <div id="menu"></div>

  <!-- PRODUTO -->
  <section class="produto-detalhe">
    <div class="produto-container">

      <!-- IMAGEM -->
      <div class="produto-img">
        <img id="imgProduto">
      </div>

      <!-- INFO -->
      <div class="produto-info">
        <h1 id="titulo">Carregando...</h1>
        <p class="descricao" id="descricao"></p>

        <button class="btn-doar" id="btnRequisitar">
          Requisitar Produto / Serviço
        </button>

        <!-- 👥 CONTADOR COMIDA -->
        <p id="contadorBox" style="margin-top:10px; font-weight:600;"></p>

        <div class="info-extra">
          <p><strong>📍 Localização:</strong> <span id="regiao"></span></p>
          <p><strong>💰 Valor:</strong> R$ <span id="valor"></span></p>

          <div class="doador">
            <p><strong>Histórico do doador</strong></p>
            <span>Bom / Sem reclamações / Usuário confiável</span>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- RELACIONADOS -->
  <section class="relacionados">
    <h2>Produtos recomendados</h2>
    <div id="relacionados" class="produtos-grid"></div>
  </section>

  <!-- FIREBASE -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "SUA_API_KEY",
      authDomain: "caridade-6464e.firebaseapp.com",
      projectId: "caridade-6464e"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
  </script>

  <!-- SCRIPT -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    let categoriaAtual = "";
    let tipoAtual = "";

    const btn = document.getElementById("btnRequisitar");
    const contadorBox = document.getElementById("contadorBox");

    /* 🔥 CARREGAR PRODUTO */
    if (!id) {
      document.getElementById("titulo").innerText = "Produto não encontrado";
    } else {
      db.collection("produtos").doc(id).get().then(doc => {
        const item = doc.data();

        if (!item) {
          document.getElementById("titulo").innerText = "Produto não encontrado";
          return;
        }

        document.getElementById("imgProduto").src = item.imagem || "https://via.placeholder.com/300";
        document.getElementById("titulo").innerText = item.titulo || "Sem título";
        document.getElementById("descricao").innerText = item.descricao || "Sem descrição";

        document.getElementById("regiao").innerText = item.regiao || "Não informado";
        document.getElementById("valor").innerText = item.valor || "0,00";

        categoriaAtual = item.categoria;
        tipoAtual = item.tipo || "outro";

        /* 🍔 COMIDA */
        if (tipoAtual === "comida") {
          btn.innerText = "Tenho interesse";

          contadorBox.innerText =
            `👥 ${item.contador || 0} pessoas demonstraram interesse`;
        }

        /* 📦 PRODUTO NORMAL JÁ REQUISITADO */
        if (item.requisitado && tipoAtual !== "comida") {
          btn.innerText = "Já requisitado";
          btn.disabled = true;
        }

        carregarRelacionados();
      });
    }

    /* 🔥 AÇÃO BOTÃO */
    btn.addEventListener("click", async () => {
      if (!id) return;

      try {
        const ref = db.collection("produtos").doc(id);
        const doc = await ref.get();
        const data = doc.data();

        /* 🍔 COMIDA → CONTADOR */
        if (tipoAtual === "comida") {
          const novoValor = (data.contador || 0) + 1;

          await ref.update({
            contador: novoValor
          });

          contadorBox.innerText =
            `👥 ${novoValor} pessoas demonstraram interesse`;

          return;
        }

        /* 📦 OUTROS → REQUISITA */
        await ref.update({
          requisitado: true
        });

        btn.innerText = "Já requisitado";
        btn.disabled = true;

        alert("Produto requisitado com sucesso!");

        carregarRelacionados();

      } catch (error) {
        console.error("Erro:", error);
      }
    });

    /* 🔥 RELACIONADOS */
    function carregarRelacionados() {
      const container = document.getElementById("relacionados");

      db.collection("produtos")
        .where("categoria", "==", categoriaAtual)
        .get()
        .then(snapshot => {

          container.innerHTML = "";

          snapshot.forEach(doc => {
            if (doc.id === id) return;

            const item = doc.data();

            const card = document.createElement("div");
            card.className = "card";

            card.onclick = () => {
              window.location.href = `produtosDetalhe.html?id=${doc.id}`;
            };

            card.innerHTML = `
              <img src="${item.imagem || 'https://via.placeholder.com/300'}">
              <div class="card-info">
                <h3>${item.titulo || ''}</h3>
                <p>${(item.descricao || '').substring(0, 60)}...</p>
                ${item.requisitado ? '<span style="color:red;font-size:12px;">Requisitado</span>' : ''}
              </div>
            `;

            container.appendChild(card);
          });
        });
    }
  </script>

  <!-- MENU JS -->
  <script src="../js/menu.js"></script>
  <script src="../js/mobile-navbar.js"></script>

</body>
</html>
