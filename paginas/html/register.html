<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar - Controle de gastos</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/register.css">
</head>

<body class="centralize">

    <form>
        <h1>Criar conta</h1>

        <!-- EMAIL -->
        <div class="form-field">
            <label>Email</label>
            <input type="email"
                placeholder="seu@email.com"
                id="email"
                onchange="onChangeEmail()" />

            <div class="error" id="email-required-error">
                Email é obrigatório
            </div>

            <div class="error" id="email-invalid-error">
                Email é inválido
            </div>
        </div>

        <!-- SENHA -->
        <div class="form-field">
            <label>Senha</label>
            <input type="password"
                placeholder="Senha"
                id="password"
                onchange="onChangePassword()" />

            <div class="error" id="password-required-error">
                Senha é obrigatória
            </div>

            <div class="error" id="password-min-length-error">
                Senha deve ter pelo menos 6 caracteres
            </div>
        </div>

        <!-- CONFIRMAR SENHA -->
        <div class="form-field">
            <label>Confirmar senha</label>
            <input type="password"
                placeholder="Confirmar senha"
                id="confirmPassword"
                onchange="onChangeConfirmPassword()" />

            <div class="error" id="password-doesnt-match-error">
                Senha e confirmação devem ser iguais
            </div>
        </div>

        <!-- BOTÃO REGISTRAR -->
        <button type="button"
            class="solid"
            disabled
            onclick="register()"
            id="register-button">
            Registrar
        </button>

        <!-- BOTÃO LOGIN -->
        <button type="button"
            class="clear"
            onclick="window.location.href='login.html'">
            Já tenho conta
        </button>

    </form>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.7/firebase-auth-compat.js"></script>

    <script src="../js/firebase-init.js"></script>
    <script src="../js/register.js"></script>
    <script src="../js/validations.js"></script>
    <script src="../js/loading.js"></script>

</body>

</html>
